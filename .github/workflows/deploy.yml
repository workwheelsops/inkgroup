name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Worker and Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm install

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
          secrets: |
            ACTION_API_KEY
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
        env:
          ACTION_API_KEY: ${{ secrets.ACTION_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Show Wrangler logs on failure
        if: failure()
        run: |
          find "$HOME/.config/.wrangler/logs" -type f -maxdepth 1 -print -exec tail -n 240 {} \; || true
